<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英語学習バトル</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- バッジ通知 (スライドアップ) -->
<div id="badge-notification" class="badge-notification hidden">
  <span id="badge-notification-text"></span>
</div>

<!-- バッジモーダル -->
<div id="badge-modal" class="badge-modal hidden">
  <div class="badge-modal-box">
    <div class="badge-modal-title">🏅 バッジ一覧</div>
    <div id="badge-modal-list" class="badge-modal-list"></div>
    <button id="btn-badge-close" class="btn btn-gray">閉じる</button>
  </div>
</div>

<!-- ユーザー選択画面 -->
<div id="screen-user" class="screen active">
  <div class="container">
    <h1 class="title">英語バトル！</h1>
    <p class="subtitle">ユーザーを選んでね</p>
    <div id="user-list" class="user-list"></div>
    <div id="add-user-area" class="add-user-area">
      <button id="btn-show-add" class="btn btn-primary">＋ 新しいユーザーを追加</button>
      <div id="add-user-form" class="add-user-form hidden">
        <input type="text" id="input-username" class="text-input" placeholder="なまえを入力" maxlength="10">
        <button id="btn-save-user" class="btn btn-success">保存</button>
        <button id="btn-cancel-add" class="btn btn-gray">キャンセル</button>
      </div>
    </div>
  </div>
</div>

<!-- バトル画面 -->
<div id="screen-battle" class="screen">
  <div class="container">
    <div class="battle-header">
      <span id="battle-username" class="battle-username"></span>
      <span id="game-stage-label" class="game-stage-label">ゲームステージ 1</span>
      <span id="battle-progress" class="battle-progress">0/10 正解</span>
      <span id="battle-master-count" class="battle-master-count">📚 0</span>
      <button id="btn-mute" class="btn-mute">🔊</button>
    </div>

    <div id="enemy-area" class="enemy-area">
      <div class="enemy-status">
        <span id="enemy-name" class="enemy-name">???</span>
        <div class="hp-bar-wrap">
          <div class="hp-label">HP <span id="enemy-hp-num">100</span></div>
          <div class="hp-bar"><div id="enemy-hp-bar" class="hp-fill enemy-fill" style="width:100%"></div></div>
        </div>
      </div>
      <img id="enemy-img" class="enemy-img" src="" alt="敵">
    </div>

    <div class="question-area" id="question-area">
      <div id="stage-badge" class="stage-badge"></div>
      <div id="question-text" class="question-text"></div>
      <div id="listen-btns" class="listen-btns hidden">
        <button id="btn-play" class="btn btn-listen">🔊 再生</button>
        <button id="btn-play-slow" class="btn btn-listen-slow">🐢 ゆっくり</button>
      </div>
    </div>

    <div id="choices-area" class="choices-area">
      <button class="choice-btn" data-idx="0"></button>
      <button class="choice-btn" data-idx="1"></button>
      <button class="choice-btn" data-idx="2"></button>
      <button class="choice-btn" data-idx="3"></button>
    </div>

    <div id="input-area" class="input-area hidden">
      <input type="text" id="spell-input" class="text-input spell-input" placeholder="英語でスペルを入力">
      <button id="btn-submit-spell" class="btn btn-primary">答える</button>
    </div>

    <div class="player-area">
      <div id="special-gauge-area" class="special-gauge-area">
        ⚡ 必殺技ゲージ: <span id="special-gauge-num">0</span>/5
        <div class="special-gauge-bar">
          <div id="special-gauge-fill" class="special-gauge-fill" style="width:0%"></div>
        </div>
      </div>
      <div id="dialog-bubble" class="dialog-bubble hidden"></div>
      <div id="stage-up-notice" class="stage-up-notice hidden"></div>
      <div id="combo-display" class="combo-display hidden"></div>
      <div id="result-display" class="result-display hidden"></div>
      <button id="btn-next" class="btn btn-primary btn-next hidden">次へ →</button>
      <div class="hp-bar-wrap">
        <div class="hp-label">じぶんHP <span id="player-hp-num">100</span></div>
        <div class="hp-bar"><div id="player-hp-bar" class="hp-fill player-fill" style="width:100%"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- 結果画面 -->
<div id="screen-result" class="screen">
  <div class="container">
    <div id="result-title" class="result-title"></div>
    <div id="result-score" class="result-score"></div>
    <div id="result-word-list" class="result-word-list"></div>
    <div class="result-buttons">
      <button id="btn-retry" class="btn btn-primary">もう一度バトル</button>
      <button id="btn-back-user" class="btn btn-gray">ユーザー選択に戻る</button>
    </div>
  </div>
</div>

<!-- ステージクリア オーバーレイ -->
<div id="stage-clear-overlay" class="stage-clear-overlay hidden">
  <div class="stage-clear-box">
    <div class="stage-clear-emoji">🎉</div>
    <div class="stage-clear-title">ステージクリア！</div>
    <div id="stage-clear-info" class="stage-clear-info"></div>
    <div id="stage-clear-exp" class="stage-clear-exp"></div>
    <div class="stage-clear-buttons">
      <button id="btn-next-stage" class="btn btn-success">次のステージへ →</button>
      <button id="btn-stage-home" class="btn btn-gray">ユーザー選択に戻る</button>
    </div>
  </div>
</div>

<script src="data/words.js"></script>
<script src="app.js" defer></script>
</body>
</html>
