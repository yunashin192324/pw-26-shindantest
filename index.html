function mealCost(meal, fridge) {
  return meal.ingredients.reduce((s,i) => fridge.includes(i) ? s : s + (PRICES[i]||50), 0);
}
function makeEntry(meal, fridge) {
  return {...meal, cost:mealCost(meal,fridge),
    inFridge:meal.ingredients.filter(i=>fridge.includes(i)),
    toBuy:meal.ingredients.filter(i=>!fridge.includes(i))};
}
function pickMeal(type, excludeId, fridge) {
  const pool = MEALS.filter(m=>m.type===type && m.id!==excludeId);
  const scored = pool.map(m=>({m, s:m.ingredients.filter(i=>fridge.includes(i)).length+Math.random()*2}));
  scored.sort((a,b)=>b.s-a.s);
  return scored[0]?.m;
}
function genPlan(days, types, fridge) {
  const usedIds = {};
  types.forEach(t => { usedIds[t] = new Set(); });
  const usedSideIds = new Set();
  return Array.from({length:days},(_,i)=>{
    const meals = {};
    types.forEach(t=>{
      let pool = MEALS.filter(m=>m.type===t && !usedIds[t].has(m.id));
      if(pool.length===0){ usedIds[t].clear(); pool=MEALS.filter(m=>m.type===t); }
      const scored = pool.map(m=>({m,s:m.ingredients.filter(i=>fridge.includes(i)).length+Math.random()}));
      scored.sort((a,b)=>b.s-a.s);
      const c = scored[0].m;
      usedIds[t].add(c.id);
      let sides = [];
      if(t!=='朝'){
        let sp = SIDE_DISHES.filter(s=>!usedSideIds.has(s.id));
        if(sp.length===0){ usedSideIds.clear(); sp=[...SIDE_DISHES]; }
        const pick = sp[Math.floor(Math.random()*sp.length)];
        usedSideIds.add(pick.id);
        sides=[{...pick,cost:pick.ingredients.reduce((s,i)=>fridge.includes(i)?s:s+(PRICES[i]||50),0),toBuy:pick.ingredients.filter(i=>!fridge.includes(i)),inFridge:pick.ingredients.filter(i=>fridge.includes(i))}];
      }
      meals[t]={...makeEntry(c,fridge),sides};
    });
    return {day:i+1,meals};
  });
}

function Steps({step}){
  const labels = ['設定','献立','まとめ'];
  return (
    <div className="flex items-center justify-center mb-8">
      {labels.map((s,i)=>(
        <React.Fragment key={i}>
          <div className="flex flex-col items-center">
            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all ${i+1<step?'bg-green-500 text-white':i+1===step?'bg-green-600 text-white ring-4 ring-green-100':'bg-gray-200 text-gray-400'}`}>
              {i+1<step?'✓':i+1}
            </div>
            <span className={`text-xs mt-1 font-medium ${i+1<=step?'text-green-600':'text-gray-400'}`}>{s}</span>
          </div>
          {i<2&&<div className={`h-0.5 w-16 mx-1 mb-4 ${i+1<step?'bg-green-500':'bg-gray-200'}`}/>}
        </React.Fragment>
      ))}

  );
}

function App(){
  const [step,setStep] = useState(1);
  const [days,setDays] = useState(3);
  const [types,setTypes] = useState(['朝','昼','夜']);
  const [market,setMarket] = useState('イオン');
  const [fridgeInput,setFridgeInput] = useState('');
  const [fridge,setFridge] = useState(['ご飯','卵','味噌','醤油','みりん']);
  const [plan,setPlan] = useState(null);
  const [activeDay,setActiveDay] = useState(0);

  const toggleType = t => setTypes(prev=>
    prev.includes(t)?(prev.length>1?prev.filter(x=>x!==t):prev)
    :[...prev,t].sort((a,b)=>['朝','昼','夜'].indexOf(a)-['朝','昼','夜'].indexOf(b))
  );

  const addFridge = (item) => {
    const v = (item||fridgeInput).trim();
    if(v && !fridge.includes(v)) setFridge(p=>[...p,v]);
    if(!item) setFridgeInput('');
  };

  const handleGen = () => {
    setPlan(genPlan(days,types,fridge));
    setActiveDay(0);
    setStep(2);
  };

  const reroll = useCallback((di,t)=>{
    setPlan(prev=>{
      const cid = prev[di]?.meals[t]?.id;
      const c = pickMeal(t,cid,fridge);
      if(!c) return prev;
      return prev.map((d,i)=>i!==di?d:{...d,meals:{...d.meals,[t]:makeEntry(c,fridge)}});
    });
  },[fridge]);

  const dayCost = d => Object.values(d.meals).reduce((s,m)=>s+m.cost+(m.sides||[]).reduce((a,b)=>a+b.cost,0),0);

  const summary = useMemo(()=>{
    if(!plan) return null;
    const all = plan.flatMap(d=>Object.values(d.meals));
    if(!all.length) return null;
    const shopMap = {};
    all.forEach(m=>{
      m.toBuy.forEach(i=>{if(!shopMap[i]) shopMap[i]=PRICES[i]||50;});
      (m.sides||[]).forEach(side=>side.toBuy.forEach(i=>{if(!shopMap[i]) shopMap[i]=PRICES[i]||50;}));
    });
    const shopTotal = Object.values(shopMap).reduce((s,c)=>s+c,0);
    const avg = k => Math.round(all.reduce((s,m)=>s+m.nutrition[k],0)/all.length);
    return {shopTotal,shopMap,mealCount:all.length,
      avg:{protein:avg('protein'),carbs:avg('carbs'),fat:avg('fat'),fiber:avg('fiber'),calories:avg('calories')}};
  },[plan]);

  return (
    <div className="min-h-screen bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50">
      <div className="max-w-2xl mx-auto px-4 py-8">

        <div className="text-center mb-8">
          <div className="text-5xl mb-2">🍱</div>
          <h1 className="text-2xl font-bold text-gray-800">献立プランナー</h1>
          <p className="text-sm text-gray-500 mt-1">栄養バランス・費用がひと目でわかる</p>
        </div>

        <Steps step={step}/>

        {/* STEP 1 */}
        {step===1&&(
          <div className="space-y-5">
            <div className="bg-white rounded-2xl shadow-sm p-6">
              <h2 className="font-bold text-gray-700 mb-4">📅 日数を選ぶ</h2>
              <div className="flex gap-2 flex-wrap">
                {[1,2,3,4,5,6,7].map(d=>(
                  <button key={d} onClick={()=>setDays(d)}
                    className={`w-12 h-12 rounded-full font-bold text-sm transition-all ${days===d?'bg-green-500 text-white shadow-md scale-110':'bg-gray-100 text-gray-600 hover:bg-green-100'}`}>
                    {d}日
                  </button>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm p-6">
              <h2 className="font-bold text-gray-700 mb-4">🍽️ 食事の種類</h2>
              <div className="flex gap-3">
                {['朝','昼','夜'].map(t=>{
                  const s=MEAL_STYLES[t], on=types.includes(t);
                  return (
                    <button key={t} onClick={()=>toggleType(t)}
                      className={`flex-1 py-3 rounded-xl font-bold text-sm transition-all ${on?s.btnOn:s.btnOff}`}>
                      {ICONS[t]} {LABELS[t]}
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm p-6">
              <h2 className="font-bold text-gray-700 mb-4">🏪 利用するスーパー</h2>
              <div className="grid grid-cols-2 gap-2">
                {SUPERMARKETS.map(s=>(
                  <button key={s} onClick={()=>setMarket(s)}
                    className={`py-2.5 px-3 rounded-xl text-sm font-medium transition-all ${market===s?'bg-green-500 text-white shadow-sm':'bg-gray-50 text-gray-600 hover:bg-green-50 border border-gray-200'}`}>
                    {s}
                  </button>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm p-6">
              <h2 className="font-bold text-gray-700 mb-1">🧊 冷蔵庫の食材</h2>
              <p className="text-xs text-gray-400 mb-3">ある食材はコストから除外されます</p>
              <div className="flex gap-2 mb-3">
                <input type="text" value={fridgeInput}
                  onChange={e=>setFridgeInput(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&addFridge()}
                  placeholder="食材名を入力（例：豆腐）"
                  className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-300"/>
                <button onClick={()=>addFridge()}
                  className="bg-green-500 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-green-600 transition-all">追加</button>
              </div>
              <div className="flex flex-wrap gap-1.5 mb-3">
                {QUICK_FRIDGE.filter(i=>!fridge.includes(i)).map(i=>(
                  <button key={i} onClick={()=>addFridge(i)}
                    className="text-xs bg-gray-50 text-gray-500 border border-gray-200 px-2 py-1 rounded-full hover:bg-green-50 hover:text-green-600 hover:border-green-200 transition-all">
                    + {i}
                  </button>
                ))}
              </div>
              <div className="flex flex-wrap gap-2">
                {fridge.map(item=>(
                  <span key={item} className="flex items-center gap-1 bg-green-50 text-green-700 border border-green-200 px-3 py-1 rounded-full text-sm">
                    ✓ {item}
                    <button onClick={()=>setFridge(p=>p.filter(i=>i!==item))} className="text-green-400 hover:text-red-400 ml-1 font-bold">×</button>
                  </span>
                ))}
                {fridge.length===0&&<p className="text-sm text-gray-400">食材がありません</p>}
              </div>
            </div>

            <button onClick={handleGen}
              className="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold text-lg rounded-2xl shadow-lg hover:shadow-xl hover:from-green-600 hover:to-emerald-600 transition-all">
              献立を作成する →
            </button>
          </div>
        )}

        {/* STEP 2 */}
        {step===2&&plan&&(
          <div>
            <div className="flex gap-2 mb-5 overflow-x-auto pb-1">
              {plan.map((dp,i)=>(
                <button key={i} onClick={()=>setActiveDay(i)}
                  className={`shrink-0 px-4 py-2 rounded-xl text-sm font-bold transition-all ${activeDay===i?'bg-green-500 text-white shadow-md':'bg-white text-gray-500 hover:bg-green-50 border border-gray-100'}`}>
                  {i+1}日目
                  <span className={`ml-1.5 text-xs ${activeDay===i?'text-green-100':'text-green-500'}`}>¥{dayCost(dp).toLocaleString()}</span>
                </button>
              ))}
            </div>

            {plan[activeDay]&&(
              <>
                <div className="bg-white rounded-2xl shadow-sm p-4 mb-4 flex items-center justify-between">
                  <div>
                    <p className="text-sm text-gray-500">{activeDay+1}日目の食費（買い物分）</p>
                    <p className="text-3xl font-bold text-green-600">¥{dayCost(plan[activeDay]).toLocaleString()}</p>
                  </div>
                  <div className="text-4xl">🛒</div>
                </div>
                <div className="space-y-4">
                  {types.map(t=>plan[activeDay].meals[t]&&(
                    <MealCard key={t} type={t} meal={plan[activeDay].meals[t]} fridge={fridge} onReroll={()=>reroll(activeDay,t)}/>
                  ))}
                </div>
              </>
            )}

            <div className="flex gap-3 mt-6">
              <button onClick={()=>setStep(1)} className="flex-1 py-3 bg-white border border-gray-200 text-gray-600 font-bold rounded-2xl hover:bg-gray-50 transition-all">← 設定</button>
              <button onClick={()=>setStep(3)} className="flex-1 py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold rounded-2xl shadow-md hover:shadow-lg transition-all">まとめを見る →</button>
            </div>
          </div>
        )}

        {/* STEP 3 */}
        {step===3&&summary&&(
          <div className="space-y-5">
            <div className="bg-gradient-to-r from-green-500 to-emerald-500 rounded-2xl p-6 text-white shadow-lg">
              <p className="text-sm opacity-80 mb-1">{days}日間の食材費（買い物分）</p>
              <p className="text-5xl font-bold">¥{summary.shopTotal.toLocaleString()}</p>
              <p className="text-sm opacity-70 mt-2">{summary.mealCount}食分 ／ 1食あたり約 ¥{Math.round(summary.shopTotal/summary.mealCount).toLocaleString()}</p>
            </div>

            <div className="bg-white rounded-2xl shadow-sm p-6">
              <h2 className="font-bold text-gray-700 mb-4">📊 平均栄養バランス（1食あたり）</h2>
              {NBARS.map(({key,label,color})=>(
                <NBar key={key} label={label} value={summary.avg[key]} color={color}/>
              ))}
              <div className="mt-4 bg-gray-50 rounded-xl p-3 text-center">
                <p className="text-xs text-gray-500 mb-1">平均カロリー</p>
                <p className="text-3xl font-bold text-gray-700">{summary.avg.calories}<span className="text-base font-normal text-gray-400"> kcal / 食</span></p>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm p-6">
              <h2 className="font-bold text-gray-700 mb-1">🛒 買い物リスト</h2>
              <p className="text-xs text-gray-400 mb-4">{market} で購入する食材</p>
              {Object.keys(summary.shopMap).length===0?(
                <p className="text-sm text-green-600 font-medium text-center py-4">✓ 全ての食材が冷蔵庫にあります！</p>
              ):(
                <>
                  {Object.entries(summary.shopMap).sort((a,b)=>b[1]-a[1]).map(([ing,cost])=>(
                    <div key={ing} className="flex items-center justify-between py-2.5 border-b border-gray-50 last:border-0">
                      <div className="flex items-center gap-2">
                        <div className="w-1.5 h-1.5 rounded-full bg-green-400"/>
                        <span className="text-sm text-gray-700">{ing}</span>
                      </div>
                      <span className="text-sm font-bold text-gray-600">¥{cost.toLocaleString()}</span>
                    </div>
                  ))}
                  <div className="flex items-center justify-between pt-3 mt-3 border-t-2 border-gray-100">
                    <span className="font-bold text-gray-700">合計</span>
                    <span className="font-bold text-green-600 text-xl">¥{summary.shopTotal.toLocaleString()}</span>
                  </div>
                </>
              )}
            </div>

            <div className="flex gap-3">
              <button onClick={()=>setStep(2)} className="flex-1 py-3 bg-white border border-gray-200 text-gray-600 font-bold rounded-2xl hover:bg-gray-50 transition-all">← 献立に戻る</button>
              <button onClick={()=>{setStep(1);setPlan(null);}} className="flex-1 py-3 bg-gradient-to-r from-green-500 to-emerald-500 text-white font-bold rounded-2xl shadow-md hover:shadow-lg transition-all">最初からやり直す</button>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
