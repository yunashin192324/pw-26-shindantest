// セッションをlocalStorageへ保存・読み込み
const SESSION_KEY = "his_wedding_chat_session";
function loadSession() {
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    return saved ? JSON.parse(saved) : null;
  } catch { return null; }
}
function saveSession(messages) {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(messages.slice(-40))); } catch {}
}
function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch {}
}

function HISWeddingChatbot() {
  const saved = loadSession();
  const [messages, setMessages] = useState(saved && saved.length > 0 ? saved : [INITIAL_MESSAGE]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showSuggestions, setShowSuggestions] = useState(!saved || saved.length <= 1);
  const [apiKey, setApiKey] = useState(getApiKey());
  const [error, setError] = useState("");
  const [copiedIdx, setCopiedIdx] = useState(null);
  const messagesEndRef = useRef(null);
  const textareaRef = useRef(null);
  const abortRef = useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  // 会話が更新されるたびに保存
  useEffect(() => { saveSession(messages); }, [messages]);

  const copyMessage = async (text, idx) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopiedIdx(idx);
      setTimeout(() => setCopiedIdx(null), 2000);
    } catch {}
  };

  const cancelRequest = () => {
    abortRef.current?.abort();
    setLoading(false);
    setError("送信をキャンセルしました。");
  };

  const sendMessage = useCallback(async (text) => {
    const userText = (text || input).trim();
    if (!userText || loading) return;
    if (userText.length > 500) return;

    setInput("");
    if (textareaRef.current) textareaRef.current.style.height = "auto";
    setShowSuggestions(false);
    setError("");

    const ts = new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    const newMessages = [...messages, { role: "user", content: userText, ts }];
    setMessages(newMessages);
    setLoading(true);

    const controller = new AbortController();
    abortRef.current = controller;

    try {
      // Gemini形式に変換（初回のアシスタント挨拶は除外、role名を変換）
      const history = newMessages.slice(-20);
      const firstUserIdx = history.findIndex(m => m.role === "user");
      const apiContents = history.slice(firstUserIdx).map(m => ({
        role: m.role === "assistant" ? "model" : "user",
        parts: [{ text: m.content }],
      }));

      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: "POST",
          signal: controller.signal,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
            contents: apiContents,
            generationConfig: { maxOutputTokens: 1000, temperature: 0.7 },
          }),
        }
      );

      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        const detail = errData.error?.message || "";
        throw new Error(`エラー ${response.status}: ${detail}`);
      }

      const data = await response.json();
      const rawText = data.candidates?.[0]?.content?.parts
        ?.filter(p => p.text)
        .map(p => p.text)
        .join("\n") || "申し訳ありません、もう一度お試しください。";

      const suggMatch = rawText.match(/\[SUGGESTIONS:\s*([^\]]+)\]/);
      const suggestions = suggMatch
        ? suggMatch[1].split("|").map(s => s.trim()).filter(Boolean)
        : [];
      const content = rawText.replace(/\[SUGGESTIONS:[^\]]*\]/g, "").trimEnd();
      const resTs = new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });

      setMessages([...newMessages, { role: "assistant", content, suggestions, ts: resTs }]);
    } catch (e) {
      if (e.name === "AbortError") return;
      setError(e.message || "通信エラーが発生しました。");
      setMessages(prev => prev.slice(0, -1));
      setInput(userText);
    } finally {
      setLoading(false);
      abortRef.current = null;
    }
  }, [messages, input, loading, apiKey]);

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };

  // シンプルなマークダウンレンダラー
  const renderInline = (text) => {
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) =>
      p.startsWith("**") && p.endsWith("**")
        ? <strong key={i} style={{ fontWeight: 700 }}>{p.slice(2, -2)}</strong>
        : <span key={i}>{p}</span>
    );
  };

  const formatMessage = (text) => {
    const lines = text.split("\n");
    const result = [];
    let listItems = [];
    const flushList = () => {
      if (listItems.length) {
        result.push(
          <ul key={`ul-${result.length}`} style={{ margin: "6px 0 6px 16px", padding: 0, listStyle: "disc" }}>
            {listItems.map((item, i) => (
              <li key={i} style={{ marginBottom: 3 }}>{renderInline(item)}</li>
            ))}
          </ul>
        );
        listItems = [];
      }
    };
    lines.forEach((line, i) => {
      const bullet = line.match(/^[-・•]\s+(.+)/);
      if (bullet) {
        listItems.push(bullet[1]);
      } else {
        flushList();
        if (line.trim() === "") {
          result.push(<br key={`br-${i}`} />);
        } else {
          result.push(<span key={`line-${i}`} style={{ display: "block" }}>{renderInline(line)}</span>);
        }
      }
    });
    flushList();
    return result;
  };

  // 来店CTAを表示するのはアシスタントの最後メッセージ、かつ3往復以上のとき
  // 会話の温度感を見てCTAを出すか判断

    return highIntent ? messages.length >= 3 : messages.length >= 7;
  };

  const resetChat = () => {
    clearSession();
    setMessages([INITIAL_MESSAGE]);
    setShowSuggestions(true);
    setInput("");
    setError("");
  };

    return <ApiKeyModal onSave={setApiKey} />;
  }

          flex: 1, overflowY: "auto", padding: "16px 14px",
          background: "rgba(253,248,242,0.97)",
          display: "flex", flexDirection: "column", gap: 14,
        }}>
          {messages.map((msg, i) => (
            <div key={i} style={{
              display: "flex",
              justifyContent: msg.role === "user" ? "flex-end" : "flex-start",
              alignItems: "flex-end", gap: 8,
              animation: "fadeIn 0.3s ease",
            }}>
              {msg.role === "assistant" && (
                <div style={{
                  width: 26, height: 26, borderRadius: "50%",
                  background: "linear-gradient(135deg,#d4a96a,#b89a6e)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 12, flexShrink: 0,
                }}>💍</div>
              )}
              <div style={{ maxWidth: "78%" }}>
                <div style={{
                  padding: msg.role === "user" ? "9px 13px" : "11px 15px",
                  borderRadius: msg.role === "user"
                    ? "18px 18px 4px 18px"
                    : "18px 18px 18px 4px",
                  background: msg.role === "user"
                    ? "linear-gradient(135deg,#4a3728,#2c2416)"
                    : "white",
                  color: msg.role === "user" ? "#f5e6cc" : "#3a2e24",
                  fontSize: 13, lineHeight: 1.75,
                  boxShadow: msg.role === "user"
                    ? "0 2px 10px rgba(44,36,22,0.2)"
                    : "0 2px 10px rgba(0,0,0,0.07)",
                }}>
                  {formatMessage(msg.content)}
                  {showCTA(i) && (
                    <a
                      href={RESERVATION_URL}
                      target="_blank" rel="noopener noreferrer"
                      style={{
                        display: "block", marginTop: 12, padding: "9px 14px",
                        background: "linear-gradient(135deg,#d4a96a,#b89a6e)",
                        color: "#2c2416", borderRadius: 10, fontSize: 12,
                        fontWeight: 700, textDecoration: "none", textAlign: "center",
                      }}
                    >✨ 無料来店相談を予約する</a>
                  )}
                </div>
                {/* タイムスタンプ＋コピーボタン */}
                <div style={{
                  display: "flex", alignItems: "center", gap: 8, marginTop: 4,
                  justifyContent: msg.role === "user" ? "flex-end" : "flex-start",
                }}>
                  {msg.ts && (
                    <span style={{ fontSize: 10, color: "#b89a6e" }}>{msg.ts}</span>
                  )}
                  {msg.role === "assistant" && (
                    <button
                      onClick={() => copyMessage(msg.content, i)}
                      title="コピー"
                      style={{
                        background: "none", border: "none", cursor: "pointer",
                        fontSize: 11, color: copiedIdx === i ? "#4a9" : "#b89a6e", padding: 0,
                      }}
                    >{copiedIdx === i ? "✓ コピー済" : "コピー"}</button>
                  )}
                </div>
              </div>

              {/* サジェストボタン（最後のアシスタントメッセージのみ） */}
              {msg.role === "assistant" && i === messages.length - 1 && msg.suggestions?.length > 0 && !loading && (
                <div style={{ display: "flex", flexDirection: "column", gap: 6, maxWidth: "78%", marginLeft: 34 }}>
                  {msg.suggestions.map((q, si) => (
                    <button
                      key={si}
                      onClick={() => sendMessage(q)}
                      style={{
                        padding: "7px 13px", borderRadius: 16, textAlign: "left",
                        border: "1.5px solid #d4a96a",
                        background: "rgba(255,255,255,0.85)",
                        color: "#4a3728", fontSize: 12, cursor: "pointer",
                        lineHeight: 1.4,
                      }}
                    >{q}</button>
                  ))}
                </div>
              )}
            </div>
          ))}

          {loading && (
            <div style={{ display: "flex", alignItems: "flex-end", gap: 8 }}>
              <div style={{
                width: 26, height: 26, borderRadius: "50%",
                background: "linear-gradient(135deg,#d4a96a,#b89a6e)",
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12,
              }}>💍</div>
              <div style={{
                background: "white", borderRadius: "18px 18px 18px 4px",
                padding: "11px 15px", boxShadow: "0 2px 10px rgba(0,0,0,0.07)",
              }}>
                <TypingDots />
              </div>
            </div>
          )}

          {error && (
            <div style={{
              background: "#fff0f0", border: "1px solid #ffcccc",
              borderRadius: 12, padding: "10px 14px", fontSize: 12, color: "#c0392b",
              textAlign: "center",
            }}>
              ⚠️ {error}
            </div>
          )}

          {showSuggestions && messages.length === 1 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginTop: 4 }}>
              {SUGGESTED_QUESTIONS.map((q, i) => (
                <button
                  key={i}
                  onClick={() => sendMessage(q)}
                  style={{
                    padding: "7px 12px", borderRadius: 20,
                    border: "1.5px solid #d4a96a",
                    background: "rgba(255,255,255,0.85)",
                    color: "#4a3728", fontSize: 11, cursor: "pointer",
                  }}
                >{q}</button>
              ))}
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>

        {/* 入力エリア */}
        <div style={{
          background: "white", borderRadius: "0 0 20px 20px",
          padding: "10px 14px 12px",
          boxShadow: "0 -4px 20px rgba(0,0,0,0.05)",
          borderTop: "1px solid rgba(212,169,106,0.2)",
        }}>
          <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
            <textarea
              ref={textareaRef}
              value={input}
              onChange={(e) => {
                setInput(e.target.value.slice(0, 500));
                e.target.style.height = "auto";
                e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px";
              }}
              onKeyDown={handleKeyDown}
              placeholder="ご希望のエリアやスタイルをお聞かせください..."
              rows={1}
              style={{
                flex: 1, border: "1.5px solid #e8d9c5", borderRadius: 12,
                padding: "9px 12px", fontSize: 13, fontFamily: "inherit",
                outline: "none", resize: "none", color: "#3a2e24",
                background: "#fdf8f2", lineHeight: 1.5, overflow: "hidden",
              }}
              onFocus={e => e.target.style.borderColor = "#d4a96a"}
              onBlur={e => e.target.style.borderColor = "#e8d9c5"}
            />
            {loading ? (
              <button
                onClick={cancelRequest}
                style={{
                  width: 40, height: 40, borderRadius: "50%", border: "none",
                  background: "#fde8e8", color: "#c0392b",
                  cursor: "pointer", fontSize: 16, flexShrink: 0,
                }}
                title="キャンセル"
              >✕</button>
            ) : (
              <button
                onClick={() => sendMessage()}
                disabled={!input.trim() || input.length > 500}
                style={{
                  width: 40, height: 40, borderRadius: "50%", border: "none",
                  background: input.trim() && input.length <= 500
                    ? "linear-gradient(135deg,#d4a96a,#8b6940)"
                    : "#e8d9c5",
                  color: input.trim() && input.length <= 500 ? "white" : "#b89a6e",
                  cursor: input.trim() && input.length <= 500 ? "pointer" : "not-allowed",
                  fontSize: 15, flexShrink: 0,
                }}
              >↑</button>
            )}
          </div>
          <div style={{
            display: "flex", justifyContent: "space-between",
            marginTop: 5, padding: "0 2px",
          }}>
            <span style={{ fontSize: 10, color: "#c8b89a" }}>
              Enter で送信 · Shift+Enter で改行
            </span>
            <span style={{
              fontSize: 10,
              color: input.length > 450 ? "#c0392b" : "#c8b89a",
            }}>
              {input.length > 0 ? `${input.length}/500` : ""}
            </span>
          </div>
        </div>
      </div>

      <style>{`
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:#d4a96a44;border-radius:4px}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<HISWeddingChatbot />);
</script>
</body>
</html>
